# CI profile: fastapi-db
# FastAPI + PostgreSQL (asyncpg) + Alembic + Celery/Redis
# Lint + typecheck + test (postgres) + migration-check + docker-build

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install 3.12
      - run: uv sync --dev
      - run: uv run ruff check . --output-format=github
      - run: uv run ruff format --check .

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install 3.12
      - run: uv sync --dev
      - run: uv run mypy src/

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: calorie
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: calorie_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install 3.12
      - run: uv sync --dev

      - name: Run tests
        env:
          ENVIRONMENT: test
          POSTGRES_SYNC_URL: postgresql+psycopg2://calorie:secret@localhost:5432/calorie_test
          POSTGRES_URL: postgresql+asyncpg://calorie:secret@localhost:5432/calorie_test
        run: uv run pytest --cov=src --cov-report=xml --cov-fail-under=70

      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  migration-check:
    name: Migration check
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: calorie
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: calorie_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv python install 3.12
      - run: uv sync

      - name: Apply migrations
        env:
          POSTGRES_SYNC_URL: postgresql+psycopg2://calorie:secret@localhost:5432/calorie_test
          PYTHONPATH: src
        run: uv run alembic -c alembic.ini upgrade head

      - name: Check for migration drift
        env:
          POSTGRES_SYNC_URL: postgresql+psycopg2://calorie:secret@localhost:5432/calorie_test
          PYTHONPATH: src
        run: uv run alembic -c alembic.ini check

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, migration-check, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
