services:
  api:
    build: .
    container_name: phs_calorie_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "${APP_PORT:-8001}:8000"
    volumes:
      - photo_storage:/app/photos
      - ./frontend/dist:/app/frontend/dist:ro
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: phs_calorie_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: calorie
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: calorie_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: phs_calorie_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  worker:
    build: .
    container_name: phs_calorie_worker
    restart: unless-stopped
    env_file: .env
    command: uv run celery -A calorie_app.worker.celery_app worker --loglevel=info
    volumes:
      - photo_storage:/app/photos
    depends_on:
      - redis
      - postgres

  beat:
    build: .
    container_name: phs_calorie_beat
    restart: unless-stopped
    env_file: .env
    command: uv run celery -A calorie_app.worker.celery_app beat --loglevel=info
    depends_on:
      - redis

  tunnel:
    image: yuccastream/tuna:latest
    container_name: phs_calorie_tunnel
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    entrypoint: ""
    command: >
      sh -c "
        tuna config save-token $${TUNA_TOKEN};
        tuna http api:8000 --subdomain=$${TUNA_SUBDOMAIN};
      "

volumes:
  postgres_data:
  redis_data:
  photo_storage:
